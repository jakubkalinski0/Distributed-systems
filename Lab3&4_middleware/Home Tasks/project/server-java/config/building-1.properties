# Konfiguracja serwera Ice "building-1" - 5 urzadzen na porcie 10000.
# Format kluczy:
#   building.name        - nazwa logiczna (uzywana w logach i Building.getName)
#   building.endpoints   - endpoints adaptera (Slice/Ice format)
#   devices              - lista identity urzadzen (oddzielona przecinkami)
#   <id>.kind            - typ servanta: Light | ColorLight | Thermostat | Camera
#   <id>.power           - On | Off (domyslnie Off)
#   <id>.brightness      - 0..100 (Light/ColorLight)
#   <id>.color           - "r,g,b" w 0..255 (ColorLight)
#   <id>.target          - float, stopnie Celsjusza (Thermostat)
#   <id>.mode            - ModeOff | Heating | Cooling (Thermostat)
#   <id>.pan / .tilt     - float (Camera)
#   <id>.zoom            - 1..10 (Camera)

building.name      = building-1
building.endpoints = tcp -h localhost -p 10000

devices = light-1,light-2,clight-1,thermo-1,camera-1

light-1.kind        = Light
light-1.power       = On
light-1.brightness  = 40

light-2.kind        = Light
light-2.power       = Off
light-2.brightness  = 0

clight-1.kind       = ColorLight
clight-1.power      = On
clight-1.brightness = 80
clight-1.color      = 255,0,0

thermo-1.kind   = Thermostat
thermo-1.power  = On
thermo-1.target = 21.5
thermo-1.mode   = Heating

camera-1.kind  = Camera
camera-1.power = On
camera-1.pan   = 0.0
camera-1.tilt  = 0.0
camera-1.zoom  = 1
