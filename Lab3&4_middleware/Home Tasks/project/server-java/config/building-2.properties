# Konfiguracja serwera Ice "building-2" - 5 urzadzen na porcie 10001.
# Lacznie z building-1 daje 10 instancji (zgodnie z wymogiem "okolo 10").

building.name      = building-2
building.endpoints = tcp -h localhost -p 10001

devices = light-3,clight-2,clight-3,thermo-2,camera-2

light-3.kind        = Light
light-3.power       = Off
light-3.brightness  = 0

clight-2.kind       = ColorLight
clight-2.power      = On
clight-2.brightness = 50
clight-2.color      = 0,255,0

clight-3.kind       = ColorLight
clight-3.power      = Off
clight-3.brightness = 0
clight-3.color      = 0,0,255

thermo-2.kind   = Thermostat
thermo-2.power  = On
thermo-2.target = 18.0
thermo-2.mode   = Cooling

camera-2.kind  = Camera
camera-2.power = On
camera-2.pan   = 45.0
camera-2.tilt  = -10.0
camera-2.zoom  = 2
