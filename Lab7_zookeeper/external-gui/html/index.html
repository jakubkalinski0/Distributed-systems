<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>External GUI — ZooKeeper Watcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 3rem;
      text-align: center;
      max-width: 480px;
      backdrop-filter: blur(8px);
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.75rem; color: #4ecca3; }
    p { line-height: 1.6; opacity: 0.9; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1.25rem;
      background: #4ecca3;
      color: #1a1a2e;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>External Application Running</h1>
    <p>This graphical companion app was launched because znode <strong>/a</strong> was created in ZooKeeper.</p>
    <p style="margin-top:1rem;font-size:0.85rem;opacity:0.7;">It will be terminated when znode <strong>/a</strong> is deleted.</p>
    <span class="badge">ACTIVE</span>
  </div>
</body>
</html>
