services:
  zk1:
    image: zookeeper:3.8.4
    hostname: zk1
    container_name: zk1
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: ruok,stat,mntr
    networks:
      - zknet
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  zk2:
    image: zookeeper:3.8.4
    hostname: zk2
    container_name: zk2
    ports:
      - "2182:2181"
    environment:
      ZOO_MY_ID: 2
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: ruok,stat,mntr
    networks:
      - zknet
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  zk3:
    image: zookeeper:3.8.4
    hostname: zk3
    container_name: zk3
    ports:
      - "2183:2181"
    environment:
      ZOO_MY_ID: 3
      ZOO_SERVERS: server.1=zk1:2888:3888;2181 server.2=zk2:2888:3888;2181 server.3=zk3:2888:3888;2181
      ZOO_4LW_COMMANDS_WHITELIST: ruok,stat,mntr
    networks:
      - zknet
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  external-gui:
    image: nginx:alpine
    container_name: external-gui
    ports:
      - "9090:80"
    volumes:
      - ./external-gui/html:/usr/share/nginx/html:ro
    networks:
      - zknet
  # Started/stopped by watcher-app via Docker API; kept in compose for image/volume setup.

  watcher-app:
    build:
      context: ./watcher-app
      dockerfile: Dockerfile
    container_name: watcher-app
    ports:
      - "8080:8080"
    environment:
      ZK_CONNECT_STRING: zk1:2181,zk2:2181,zk3:2181
      ZK_ROOT_PATH: /a
      HTTP_PORT: "8080"
      EXTERNAL_APP_MODE: docker
      EXTERNAL_DOCKER_CONTAINER: external-gui
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      zk1:
        condition: service_healthy
      zk2:
        condition: service_healthy
      zk3:
        condition: service_healthy
      external-gui:
        condition: service_started
    networks:
      - zknet

networks:
  zknet:
    driver: bridge
