services:
  jupyter:
    image: rayproject/ray:2.55.1-py310
    container_name: ray-jupyter-lab-container

    shm_size: "2gb"

    ports:
      - "8888:8888"

    volumes:
      - ./notebook:/home/ray/work
      - ./hdfs:/home/ray/hdfs

    working_dir: /home/ray/work
    environment:
      PYTHONPATH: /home/ray

    command: >
      bash -lc "
      pip install --no-cache-dir
      jupyterlab
      notebook
      ipykernel
      ipywidgets>=8.0
      pandas
      numpy
      scipy
      matplotlib
      scikit-learn
      requests
      &&
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --ServerApp.token=raylab
      --ServerApp.allow_origin='*'
      --ServerApp.notebook_dir=/home/ray/work
      "

    restart: unless-stopped
